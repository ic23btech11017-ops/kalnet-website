<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KALNET - The Digital Operating System for Modern Enterprises</title>
    <meta name="description" content="Transform your organization with Gen AI-powered software. Automate operations, boost efficiency, scale seamlessly." />

    <!-- Inter Display + Inter from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=chillax@300,400,500,600,700&display=swap" rel="stylesheet" />

    <style>
      /* Inter Display approximation via optical sizing */
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-feature-settings: 'kern' 1, 'liga' 1, 'calt' 1;
      }

      /* Headlines use Inter Display optical sizing */
      h1, h2, h3, h4, h5, h6 {
        font-optical-sizing: auto;
        font-variation-settings: 'opsz' 32;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
